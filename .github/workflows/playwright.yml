name: Playwright Finacle Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *'          # Daily at 6:00 AM UTC
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - crmCIFRetail
          - crmCIFCorporate

jobs:
  test:
    timeout-minutes: 120
    runs-on: self-hosted

    env:
      FIRSTUSERNAME: ${{ secrets.FIRSTUSERNAME }}
      SECONDUSERNAME: ${{ secrets.SECONDUSERNAME }}
      THIRDUSERNAME: ${{ secrets.THIRDUSERNAME }}
      VERIFIERUSERNAME: ${{ secrets.VERIFIERUSERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install chromium

    - name: Run Playwright tests
      shell: powershell
      run: |
        $suite = "${{ github.event.inputs.suite }}"
        if ($suite -eq "crmCIFRetail") {
          npm run test-crmCIFRetail
        } elseif ($suite -eq "crmCIFCorporate") {
          npm run test-crmCIFCorporate
        } else {
          npm test
        }

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-reports
        path: |
          reports/
          test-results/
        retention-days: 30
